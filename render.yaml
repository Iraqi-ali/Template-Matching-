# Render Blueprint — Infrastructure as Code
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: template-matching
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
